<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Loader with Fullscreen</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars when iframe is fullscreen */
            background-color: #330000; /* Dark red background */
            color: #ffdddd; /* Light red text */
            font-family: sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .url-input-container {
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            background-color: #440000; /* Darker red background for input area */
            border-bottom: 1px solid #660000;
        }

        #urlInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #660000;
            border-radius: 5px;
            background-color: #550000;
            color: #ffdddd;
            font-size: 1em;
        }

        #loadButton {
            padding: 10px 20px;
            background-color: #880000; /* Darker red load button */
            color: #ffaaaa; /* Lighter red text for button */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        #loadButton:hover {
            background-color: #aa0000; /* Even darker red on hover */
        }

        #iframeContainer {
            flex-grow: 1;
            position: relative;
            overflow: hidden; /* Hide any potential iframe overflow */
        }

        #loadedIframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fullscreen-overlay {
            position: absolute;
            bottom: 10px; /* Move to bottom */
            left: 10px; /* Move to left */
            background-color: rgba(51, 0, 0, 0.7); /* Dark red with transparency */
            color: #ffdddd;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10; /* Ensure it's on top of the iframe */
            font-size: 1em;
            border: none; /* Remove default button border */
        }

        .fullscreen-overlay:hover {
            background-color: rgba(68, 0, 0, 0.9); /* Darker red on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="url-input-container">
            <input type="text" id="urlInput" placeholder="Enter URL">
            <button id="loadButton">Load</button>
        </div>
        <div id="iframeContainer">
            <iframe id="loadedIframe" src="" frameborder="0"></iframe>
            <button class="fullscreen-overlay" id="fullscreenToggle">Fullscreen</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadButton = document.getElementById('loadButton');
        const loadedIframe = document.getElementById('loadedIframe');
        const iframeContainer = document.getElementById('iframeContainer');
        const fullscreenToggle = document.getElementById('fullscreenToggle');
        let isFullscreen = false;
        let currentFullscreenElement = null;

        loadButton.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
                loadedIframe.src = url;
            }
        });

        fullscreenToggle.addEventListener('click', () => {
            if (!isFullscreen) {
                // Enter fullscreen
                if (iframeContainer.requestFullscreen) {
                    iframeContainer.requestFullscreen();
                    currentFullscreenElement = iframeContainer;
                } else if (iframeContainer.mozRequestFullScreen) { /* Firefox */
                    iframeContainer.mozRequestFullScreen();
                    currentFullscreenElement = iframeContainer;
                } else if (iframeContainer.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                    iframeContainer.webkitRequestFullscreen();
                    currentFullscreenElement = iframeContainer;
                } else if (iframeContainer.msRequestFullscreen) { /* IE/Edge */
                    iframeContainer.msRequestFullscreen();
                    currentFullscreenElement = iframeContainer;
                }
                fullscreenToggle.textContent = 'Exit Fullscreen';
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) { /* Firefox */
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) { /* Chrome, Safari & Opera */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE/Edge */
                    document.msExitFullscreen();
                }
                fullscreenToggle.textContent = 'Fullscreen';
                currentFullscreenElement = null;
            }
            isFullscreen = !isFullscreen;
        });

        // Listen for fullscreen change events to update the button text accordingly
        document.addEventListener('fullscreenchange', () => {
            isFullscreen = !!document.fullscreenElement;
            fullscreenToggle.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
            currentFullscreenElement = document.fullscreenElement;
        });

        document.addEventListener('mozfullscreenchange', () => {
            isFullscreen = !!document.mozFullScreenElement;
            fullscreenToggle.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
            currentFullscreenElement = document.mozFullScreenElement;
        });

        document.addEventListener('webkitfullscreenchange', () => {
            isFullscreen = !!document.webkitFullscreenElement;
            fullscreenToggle.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
            currentFullscreenElement = document.webkitFullscreenElement;
        });

        document.addEventListener('msfullscreenchange', () => {
            isFullscreen = !!document.msFullscreenElement;
            fullscreenToggle.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
            currentFullscreenElement = document.msFullscreenElement;
        });
    </script>
</body>
</html>
